apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "fizzbuzz.name" . }}-api
  labels:
    {{- include "fizzbuzz.labels" . | nindent 4 }}
    {{- include "fizzbuzz.apiSelectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      {{- include "fizzbuzz.apiSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "fizzbuzz.apiSelectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: api
          image: "{{ include "fizzbuzz.apiImage" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8081
            - name: metrics
              containerPort: 9091
          envFrom:
            - configMapRef:
                name: {{ include "fizzbuzz.name" . }}
            - secretRef:
                name: {{ include "fizzbuzz.name" . }}
          env:
            - name: ADDR
              value: ":8081"
          livenessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /v1/health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "fizzbuzz.name" . }}-api
  labels:
    {{- include "fizzbuzz.labels" . | nindent 4 }}
    {{- include "fizzbuzz.apiSelectorLabels" . | nindent 4 }}
spec:
  selector:
    {{- include "fizzbuzz.apiSelectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: 80
      targetPort: http
    - name: metrics
      port: 9091
      targetPort: metrics
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "fizzbuzz.name" . }}-api
  labels:
    {{- include "fizzbuzz.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "fizzbuzz.name" . }}-api
  minReplicas: {{ .Values.api.hpa.minReplicas }}
  maxReplicas: {{ .Values.api.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.cpuUtilization }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.api.hpa.memoryUtilization }}
