image:
  registry: ""
  repository: fizzbuzz
  tag: local
  pullPolicy: Never   

config:
  env: dev
  ginMode: debug
  logLevel: debug
  logFormat: text

secrets:
  apiKey: "change-me"
  databaseURL: "postgres://fizz:fizz@host.docker.internal:5433/fizz?sslmode=disable"
  kafkaBroker: "host.docker.internal:9094"

api:
  replicas: 1
  hpa:
    minReplicas: 1
    maxReplicas: 2

worker:
  replicas: 1
  keda:
    minReplicas: 1
    maxReplicas: 10
    prometheus:
      address: "http://host.docker.internal:9090"
