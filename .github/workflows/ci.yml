name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  lint-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      # confluent-kafka-go builds bundled librdkafka from source.
      # We avoid -tags dynamic because Ubuntu's apt librdkafka is too old (< v2.14.0).
      - name: Install build deps for bundled librdkafka
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            gcc g++ make \
            libssl-dev libzstd-dev liblz4-dev libsasl2-dev zlib1g-dev

      - name: Tidy
        run: go mod tidy && git diff --exit-code go.sum

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -race -count=1 ./...

  build-binary:
    name: Build Binary
    needs: [lint-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install build deps for bundled librdkafka
        run: |
          sudo apt-get update && sudo apt-get install -y --no-install-recommends \
            gcc g++ make \
            libssl-dev libzstd-dev liblz4-dev libsasl2-dev zlib1g-dev

      - name: Build
        run: |
          CGO_ENABLED=1 GOOS=linux go build -ldflags="-w -s" -o bin/server ./cmd/server
          CGO_ENABLED=1 GOOS=linux go build -ldflags="-w -s" -o bin/stats-worker ./cmd/stats-worker

      - name: Upload binaries
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ github.sha }}
          path: bin/
          retention-days: 7

  build-docker:
    name: Docker Build & Push
    needs: [lint-test]
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (server)
        id: meta-server
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}-server
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Extract metadata (worker)
        id: meta-worker
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}-worker
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build & push server
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          push: true
          tags: ${{ steps.meta-server.outputs.tags }}
          labels: ${{ steps.meta-server.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: .
          target: worker
          push: true
          tags: ${{ steps.meta-worker.outputs.tags }}
          labels: ${{ steps.meta-worker.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
