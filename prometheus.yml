global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # fizzbuzz app runs on the host machine, not in Docker
  - job_name: fizzbuzz
    static_configs:
      - targets: ["host.docker.internal:9091"]

  # kminion runs in Docker on the same network — resolved by service name
  - job_name: kminion
    static_configs:
      - targets: ["kminion:8080"]
